      - { name: google_role, label: "Google — role", type: string }
      - { name: conmed_role, label: "ConMed — role", type: string }
      - { name: models_heading, label: "Partnership models — heading", type: string }
      - { name: model1_tag, label: "Model 1 — tag", type: string }
      - { name: model1_title, label: "Model 1 — title", type: string }
      - { name: model1_desc, label: "Model 1 — description", type: text }
      - { name: model2_tag, label: "Model 2 — tag", type: string }
      - { name: model2_title, label: "Model 2 — title", type: string }
      - { name: model2_desc, label: "Model 2 — description", type: text }
      - { name: model3_tag, label: "Model 3 — tag", type: string }
      - { name: model3_title, label: "Model 3 — title", type: string }
      - { name: model3_desc, label: "Model 3 — description", type: text }
      - { name: cta_heading, label: "Contact — heading", type: string }
      - { name: cta_text, label: "Contact — text", type: text }
      - { name: cta_button, label: "Contact — button label", type: string }

  - name: join
    label: Join
    type: file
    path: content/join.json
    fields:
      - { name: page_title, label: Page title, type: string }
      - { name: page_intro, label: Page intro, type: text }
      - { name: apply_button, label: "Apply button label (top)", type: string }
      - { name: recruit_heading, label: "Who we recruit — heading", type: string }
      - { name: level1_title, label: "Level 1 — title", type: string }
      - { name: level1_desc, label: "Level 1 — description", type: text }
      - { name: level2_title, label: "Level 2 — title", type: string }
      - { name: level2_desc, label: "Level 2 — description", type: text }
      - { name: level3_title, label: "Level 3 — title", type: string }
      - { name: level3_desc, label: "Level 3 — description", type: text }
      - { name: level4_title, label: "Level 4 — title", type: string }
      - { name: level4_desc, label: "Level 4 — description", type: text }
      - { name: values_heading, label: "What we value — heading", type: string }
